name: aiooll
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Core scientific stack
  - conda-forge::numpy>=1.24.0
  - conda-forge::pandas>=2.0.0
  - conda-forge::scipy>=1.11.0
  - conda-forge::matplotlib>=3.7.0
  - conda-forge::seaborn>=0.12.0
  - conda-forge::scikit-learn>=1.3.0
  - conda-forge::joblib>=1.3.0

  # CPU-only PyTorch (no CUDA)
  - pytorch::pytorch>=2.1.0
  - pytorch::torchvision>=0.16.0
  - pytorch::torchaudio>=2.1.0
  - pytorch::cpuonly

  # Computer Vision
  - conda-forge::opencv>=4.8.0
  - conda-forge::pillow>=10.0.0

  # Utilities
  - conda-forge::psutil>=5.9.0
  - conda-forge::tqdm>=4.66.0

  # Testing
  - conda-forge::pytest>=7.4.0
  - conda-forge::pytest-cov>=4.1.0
  - conda-forge::pytest-timeout>=2.1.0

  - pip:
    # Visualization
    - plotly>=5.15.0
    - streamlit>=1.28.0
    - streamlit-chat>=0.1.1
    - rich>=13.6.0

    # LLM / RAG / Agents
    - langchain>=0.1.0
    - langchain-community>=0.0.20
    - langchain-ollama>=0.1.0
    - langgraph>=0.1.0
    - chromadb>=0.4.22
    - ollama>=0.1.7

    # Data I/O
    - pdfplumber>=0.10.0

    # Utilities
    - python-dotenv>=1.0.0
    - pydantic>=2.4.0
    - httpx>=0.25.0
    - tenacity>=8.2.0
    - loguru>=0.7.0
